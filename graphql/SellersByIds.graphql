query SellerById($customer_id: Int!) {
  vendorStores(customer_id: $customer_id) {
    customer_id
    store_name
    store_code
    years_in_business
    area
    city
    phone
    trust_seal
    gst_number
    secure_badge
    buyer_protected_badge
    on_time_delivery_badge
    star_supplier_badge
  }
}
