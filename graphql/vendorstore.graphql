query VendorStores(
  $customer_id: Int
  $status: Int
  $mobile: String
  $store_code: String
) {
  vendorStores(
    customer_id: $customer_id
    status: $status
    mobile: $mobile
    store_code: $store_code
  ) {
    store_id
    customer_id
    store_code
    store_name
    address
    area
    city
    state
    country
    pincode
    latitude
    longitude
    status
    gst_number
    years_in_business
    trust_seal
    secure_badge
    buyer_protected_badge
    on_time_delivery_badge
    on_time_delivery_badge
    phone
    email
    logo
    certifications
    completed_projects
    awards
    about_us
    created_at
    updated_at
    firstname
    lastname
    whatsapp_number
    businesscategories
  }
}
